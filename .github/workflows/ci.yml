name: Serenity BDD - CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Trigger manual desde la UI de GitHub con parámetros
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de pruebas'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
      tags:
        description: 'Tags de Cucumber a ejecutar (ej: @smoke, @regression, @api)'
        required: false
        default: '@regression'

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Serenity Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      # En un PR solo se ejecutan los @smoke (rápidos, no bloquean al dev)
      # En push a main se ejecuta la regresión completa @regression
      # En ejecución manual se usa el tag elegido por el usuario
      - name: Run Serenity Tests
        env:
          HEADLESS: "true"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="@smoke"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAGS="${{ github.event.inputs.tags }}"
          else
            TAGS="@regression"
          fi
          echo "Ejecutando pruebas con tags: $TAGS"
          ./gradlew clean test aggregate -Dcucumber.filter.tags="$TAGS"

      - name: Upload Serenity Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/
          retention-days: 7

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/serenity/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
